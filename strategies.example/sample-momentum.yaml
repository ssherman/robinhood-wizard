# strategies.example/sample-momentum.yaml
# Copy to ~/.rh-wizard/strategies/ and run with:
#   uv run --env-file .env wizard run sample-momentum
# `intent` is the free-text thesis handed to the research LLM; `universe` lists the
# candidate tickers it may consider. Replace both with your own.
id: sample-momentum
name: Sample Momentum (example)
intent: >
  Prefer large-cap technology names with reasonable valuations. Favor a few high-conviction
  positions over many small ones.
universe: [AAPL, MSFT, NVDA]
signals_needed: [price, average_volume, market_cap, pe_ratio]
cadence: weekly
risk_overrides:
  max_position_pct: 15
